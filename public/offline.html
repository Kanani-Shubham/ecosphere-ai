<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoSphere AI | Offline Mode</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f8fafc;
      color: #1e293b;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
    }
    .container {
      max-width: 400px;
      padding: 32px;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
      border: 1px solid #f1f5f9;
      margin: 20px;
    }
    .icon {
      font-size: 48px;
      margin-bottom: 24px;
      display: inline-block;
      animation: pulse 2s infinite ease-in-out;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #0f172a;
      margin: 0 0 12px 0;
    }
    p {
      font-size: 14px;
      color: #64748b;
      line-height: 1.6;
      margin: 0 0 24px 0;
    }
    .btn {
      display: inline-block;
      background-color: #059669;
      color: #ffffff;
      font-weight: 600;
      font-size: 14px;
      padding: 12px 24px;
      border-radius: 12px;
      text-decoration: none;
      transition: background-color 0.2s;
      border: none;
      cursor: pointer;
    }
    .btn:hover {
      background-color: #047857;
    }
    .btn:focus {
      outline: 3px solid #059669;
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div class="container" role="main">
    <div class="icon" aria-hidden="true">🌱</div>
    <h1>You are currently offline</h1>
    <p>EcoSphere AI stores some carbon logs on your device, but we can't connect to our carbon databases or Gemini engine right now. Please check your internet connection.</p>
    <button class="btn" onclick="window.location.reload();" aria-label="Retry loading the application">
      Retry Connection
    </button>
  </div>
</body>
</html>
